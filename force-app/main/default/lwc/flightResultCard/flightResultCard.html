<template>

    <div class="slds-box slds-m-bottom_small">

        <div class="slds-grid slds-wrap slds-grid_vertical-align-center">

            <!-- Airline -->
            <div class="slds-col slds-size_2-of-12">
                <div class="slds-text-heading_small">
                    <strong>{flight.airline}</strong>
                </div>

                <div class="slds-text-body_small">
                    {flight.flightNumber}
                </div>
            </div>

            <!-- Departure -->
            <div class="slds-col slds-size_2-of-12">

                <div class="slds-text-heading_small">
                    {flight.origin}
                </div>

                <div class="slds-text-body_small">
                    {departure}
                </div>

            </div>

            <!-- Arrow -->
            <div class="slds-col slds-size_1-of-12 slds-align_absolute-center">

                ✈

            </div>

            <!-- Arrival -->
            <div class="slds-col slds-size_2-of-12">

                <div class="slds-text-heading_small">
                    {flight.destination}
                </div>

                <div class="slds-text-body_small">
                    {arrival}
                </div>

            </div>

            <!-- Duration -->
            <div class="slds-col slds-size_2-of-12">

                <div class="slds-text-title">
                    Duration
                </div>

                <div>
                    {flight.duration}
                </div>

            </div>

            <!-- Fare -->
            <div class="slds-col slds-size_1-of-12">

                <div class="slds-text-color_success slds-text-heading_medium">

                    {flight.price}

                </div>

                <div class="slds-text-body_small">

                    {flight.currencyCode}

                </div>

            </div>

            <!-- Button -->
            <div class="slds-col slds-size_2-of-12 slds-text-align_right">

                <lightning-button
                    label="Select Flight"
                    variant="brand"
                    onclick={handleSelect}>
                </lightning-button>

            </div>

        </div>

    </div>

</template>
